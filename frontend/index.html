<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Glow Saha - Yönetici Girişi</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'] },
                    animation: {
                        'blob': 'blob 7s infinite',
                    },
                    keyframes: {
                        blob: {
                            '0%': { transform: 'translate(0px, 0px) scale(1)' },
                            '33%': { transform: 'translate(30px, -50px) scale(1.1)' },
                            '66%': { transform: 'translate(-20px, 20px) scale(0.9)' },
                            '100%': { transform: 'translate(0px, 0px) scale(1)' },
                        }
                    }
                }
            }
        }
    </script>
    <style>
        .animation-delay-2000 { animation-delay: 2s; }
        .animation-delay-4000 { animation-delay: 4s; }
    </style>
</head>
<body class="bg-slate-900 h-screen flex items-center justify-center overflow-hidden">
    <!-- Arka plan desen ve renkleri -->
    <div class="absolute inset-0 bg-[url('data:image/svg+xml;base64,PHN2ZyB3aWR0aD0iMjAiIGhlaWdodD0iMjAiIHhtbG5zPSJodHRwOi8vd3d3LnczLm9yZy8yMDAwL3N2ZyI+PGNpcmNsZSBjeD0iMiIgY3k9IjIiIHI9IjIiIGZpbGw9InJnYmEoMjU1LDI1NSwyNTUsMC4wNSkiLz48L3N2Zz4=')] opacity-50"></div>
    
    <div class="relative w-full max-w-md px-6 z-10">
        <!-- Glow efektleri -->
        <div class="absolute top-0 -left-4 w-72 h-72 bg-purple-500 rounded-full mix-blend-multiply filter blur-3xl opacity-40 animate-blob"></div>
        <div class="absolute top-0 -right-4 w-72 h-72 bg-blue-500 rounded-full mix-blend-multiply filter blur-3xl opacity-40 animate-blob animation-delay-2000"></div>
        <div class="absolute -bottom-8 left-20 w-72 h-72 bg-indigo-500 rounded-full mix-blend-multiply filter blur-3xl opacity-40 animate-blob animation-delay-4000"></div>
        
        <div class="relative bg-slate-900/60 backdrop-blur-xl border border-white/10 p-8 rounded-2xl shadow-2xl">
            <div class="text-center mb-8">
                <!-- Marka logosu: mobil BrandLogo ile aynı reçete (gradyan #3B82F6→#8B5CF6, köşe ~%26) -->
                <div class="w-16 h-16 rounded-2xl mx-auto mb-4 flex items-center justify-center shadow-lg shadow-indigo-500/40 border border-white/30" style="background: linear-gradient(135deg, #3B82F6, #8B5CF6);">
                    <span class="text-3xl font-extrabold text-white">G</span>
                </div>
                <h1 class="text-3xl font-bold text-white tracking-tight">GLOW SAHA</h1>
                <p class="text-slate-400 mt-2 text-sm">Tesis ve Saha Yönetim Sistemi</p>
            </div>
            
            <form id="loginForm" class="space-y-5">
                <div>
                    <label class="block text-sm font-medium text-slate-300 mb-1">Firma Kodu</label>
                    <input type="text" id="firmaKodu" required class="w-full px-4 py-3 bg-white/5 border border-white/10 rounded-xl focus:ring-2 focus:ring-blue-500 focus:border-transparent text-white placeholder-slate-500 transition-all outline-none" placeholder="Firma kodunuz">
                </div>
                <div>
                    <label class="block text-sm font-medium text-slate-300 mb-1">Telefon Numarası</label>
                    <input type="tel" id="telefon" required class="w-full px-4 py-3 bg-white/5 border border-white/10 rounded-xl focus:ring-2 focus:ring-blue-500 focus:border-transparent text-white placeholder-slate-500 transition-all outline-none" placeholder="0555...">
                </div>
                <div>
                    <label class="block text-sm font-medium text-slate-300 mb-1">Şifre</label>
                    <div class="relative">
                        <input type="password" id="sifre" required class="w-full px-4 py-3 pr-12 bg-white/5 border border-white/10 rounded-xl focus:ring-2 focus:ring-blue-500 focus:border-transparent text-white placeholder-slate-500 transition-all outline-none" placeholder="••••••••">
                        <button type="button" id="sifreToggle" aria-label="Şifreyi göster/gizle" class="absolute inset-y-0 right-0 px-4 flex items-center text-slate-400 hover:text-white transition-colors">
                            <svg id="eyeOpen" class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/></svg>
                            <svg id="eyeClosed" class="w-5 h-5 hidden" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.477 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l3.59 3.59m0 0A9.953 9.953 0 0112 5c4.478 0 8.268 2.943 9.543 7a10.025 10.025 0 01-4.132 5.411m0 0L21 21"/></svg>
                        </button>
                    </div>
                </div>
                
                <button type="submit" class="w-full py-3.5 px-4 bg-gradient-to-r from-blue-600 to-purple-600 hover:from-blue-500 hover:to-purple-500 text-white rounded-xl font-semibold shadow-lg shadow-blue-500/25 transform transition-all active:scale-95 focus:outline-none focus:ring-2 focus:ring-purple-500 focus:ring-offset-2 focus:ring-offset-slate-900 mt-6">
                    Giriş Yap
                </button>
            </form>
            
            <div id="errorMessage" class="mt-4 text-center text-red-400 text-sm hidden"></div>
        </div>
    </div>

    <script>
        // Şifre göster/gizle
        document.getElementById('sifreToggle').addEventListener('click', () => {
            const inp = document.getElementById('sifre');
            const open = document.getElementById('eyeOpen');
            const closed = document.getElementById('eyeClosed');
            const goster = inp.type === 'password';
            inp.type = goster ? 'text' : 'password';
            open.classList.toggle('hidden', goster);
            closed.classList.toggle('hidden', !goster);
        });

        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const btn = e.target.querySelector('button');
            const originalText = btn.innerText;
            btn.innerHTML = '<svg class="animate-spin -ml-1 mr-3 h-5 w-5 text-white inline" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg> Giriş yapılıyor...';
            btn.disabled = true;
            
            // Backend API'ye istek atmak için hazırlık
            const firmaKodu = document.getElementById('firmaKodu').value;
            const telefon = document.getElementById('telefon').value;
            const sifre = document.getElementById('sifre').value;

            try {
                const response = await fetch('../backend/api/login.php', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ firma_kodu: firmaKodu, telefon: telefon, sifre: sifre })
                });
                
                const data = await response.json();
                
                if (response.ok && data.token) {
                    // Web paneli sadece yöneticiler içindir
                    if (data.kullanici.rol !== 'yonetici') {
                        document.getElementById('errorMessage').innerText = "Bu panel yalnızca yöneticiler içindir. Saha personeli mobil uygulamayı kullanmalıdır.";
                        document.getElementById('errorMessage').classList.remove('hidden');
                        btn.innerText = originalText;
                        btn.disabled = false;
                        return;
                    }
                    // Token'ı localStorage'a kaydet ve yönlendir
                    localStorage.setItem('glow_token', data.token);
                    localStorage.setItem('glow_user', JSON.stringify(data.kullanici));
                    window.location.href = "dashboard.html";
                } else {
                    document.getElementById('errorMessage').innerText = data.message || "Giriş başarısız.";
                    document.getElementById('errorMessage').classList.remove('hidden');
                    btn.innerText = originalText;
                    btn.disabled = false;
                }
            } catch (error) {
                document.getElementById('errorMessage').innerText = "Sunucuya bağlanılamadı.";
                document.getElementById('errorMessage').classList.remove('hidden');
                btn.innerText = originalText;
                btn.disabled = false;
            }
        });
    </script>
</body>
</html>
